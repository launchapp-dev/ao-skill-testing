tools_allowlist: [git, gh, node, npx, npm, pnpm]

mcp_servers:
  context7:
    command: npx
    args: ["-y", "@upstash/context7-mcp"]
  github:
    command: npx
    args: ["-y", "@modelcontextprotocol/server-github"]

agents:
  default:
    model: kimi-code/kimi-for-coding
    tool: oai-runner

  skill-builder:
    system_prompt: |
      You build AO skill packs. A skill pack is a set of agents, phases,
      and workflows that can be installed into any AO project.

      SKILL PACK STRUCTURE:
      - pack.toml: manifest (id, version, kind, exports)
      - runtime/agents.yaml: agent definitions (model, system_prompt, capabilities)
      - workflows/skill-pack.yaml: phase + workflow definitions
      - skills/: individual skill files
      - docs/: documentation

      YOUR JOB:
      1. Read the task description
      2. Implement the skill/agent/workflow described
      3. Follow the pack.toml schema for any manifest changes
      4. Write agent system_prompts that are detailed and actionable
      5. Test that the YAML is valid
      6. Commit changes

      AGENT PROMPT BEST PRACTICES:
      - Start with the agent's role and expertise
      - List specific capabilities and tools available
      - Define a clear step-by-step workflow
      - Include quality standards and rules
      - Be specific about what the agent should and shouldn't do
      Do not add yourself as author or co-author.
    model: kimi-code/kimi-for-coding
    tool: oai-runner
    mcp_servers: ["ao", "context7"]

  reviewer:
    system_prompt: |
      Review PRs for this skill pack. Check:
      - pack.toml is valid and exports match
      - Agent system_prompts are detailed and actionable
      - Workflow phases reference correct agents
      - YAML syntax is valid
      Use merge_pull_request MCP to merge good PRs.
    model: minimax/MiniMax-M2.7
    tool: oai-runner
    mcp_servers: ["ao", "github"]

  planner:
    system_prompt: |
      Plan work for this skill pack. Read VISION.md and requirements.
      Queue max 3 tasks. Pause at 5+ open PRs.
    model: minimax/MiniMax-M2.7
    tool: oai-runner
    mcp_servers: ["ao"]

phases:
  skill-implement:
    mode: agent
    agent: skill-builder
    directive: "Build the skill pack component described in the task."
    capabilities:
      mutates_state: true
  push-branch:
    mode: command
    command:
      program: git
      args: ["push", "-u", "origin", "HEAD"]
      cwd_mode: task_root
      timeout_secs: 60
  create-pr:
    mode: command
    command:
      program: gh
      args: ["pr", "create", "--fill", "--base", "main"]
      cwd_mode: task_root
      timeout_secs: 60
  pr-review:
    mode: agent
    agent: reviewer
    directive: "Review and merge this PR."
  pr-review-sweep:
    mode: agent
    agent: reviewer
    directive: "Pick ONE open PR. Merge, close, or queue rebase."
    capabilities:
      mutates_state: true
  work-planning:
    mode: agent
    agent: planner
    directive: "Check tasks and queue. Enqueue ready work."
  sync-main:
    mode: command
    command:
      program: git
      args: ["pull", "origin", "main", "--ff-only"]
      timeout_secs: 30

workflows:
  - id: standard
    phases:
      - skill-implement
      - push-branch
      - create-pr
      - pr-review
  - id: scaffold
    phases:
      - skill-implement
      - push-branch
      - create-pr
      - pr-review
  - id: quick-fix
    phases:
      - skill-implement
      - push-branch
      - create-pr
      - pr-review
  - id: work-planner
    phases: [work-planning]
  - id: pr-reviewer
    phases: [pr-review-sweep]
  - id: sync-main
    phases: [sync-main]

schedules:
  - id: work-planner
    cron: "*/5 * * * *"
    workflow_ref: work-planner
    enabled: true
  - id: pr-reviewer
    cron: "*/3 * * * *"
    workflow_ref: pr-reviewer
    enabled: true
  - id: sync-main
    cron: "*/5 * * * *"
    workflow_ref: sync-main
    enabled: true
