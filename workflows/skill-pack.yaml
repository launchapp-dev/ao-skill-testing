phases:
  ao.testing-implement:
    mode: agent
    agent: ao.testing-agent
    directive: "Implement the task. Read requirements, write code, commit."
    capabilities:
      mutates_state: true

  ao.jest-test-implement:
    mode: agent
    agent: ao.jest-test-generator
    directive: "Generate comprehensive Jest test files with mocking, spies, and matchers. Analyze source code, create test files, configure Jest, and verify tests pass."
    capabilities:
      mutates_state: true
      generates_code: true
      runs_tests: true

  ao.edge-case-test-implement:
    mode: agent
    agent: ao.edge-case-test-generator
    directive: "Generate edge case and error scenario tests. Detect error conditions in source code, generate tests for null/undefined, empty arrays/objects, boundary values, invalid types, and async errors. Ensure tests have meaningful assertions beyond simple equality checks."
    capabilities:
      mutates_state: true
      generates_code: true
      runs_tests: true

workflows:
  - id: ao.testing/standard
    name: "ao-skill-testing Standard"
    description: "Plan → Implement → Push → PR"
    phases:
      - ao.testing-implement
      - push-branch
      - create-pr
      - pr-review

  - id: ao.testing/quick-fix
    name: "ao-skill-testing Quick Fix"
    description: "Implement → Push → PR"
    phases:
      - ao.testing-implement
      - push-branch
      - create-pr

  - id: ao.testing/jest-generate
    name: "Jest Test Generation"
    description: "Generate comprehensive Jest test suite with mocking, spies, and configuration"
    phases:
      - ao.jest-test-implement
      - push-branch
      - create-pr
      - pr-review

  - id: ao.testing/edge-cases
    name: "Edge Case Test Generation"
    description: "Generate comprehensive edge case and error scenario tests with meaningful assertions"
    phases:
      - ao.edge-case-test-implement
      - push-branch
      - create-pr
      - pr-review
