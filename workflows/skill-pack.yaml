phases:
  ao.testing-implement:
    mode: agent
    agent: ao.testing-agent
    directive: "Implement the task. Read requirements, write code, commit."
    capabilities:
      mutates_state: true

  ao.jest-test-implement:
    mode: agent
    agent: ao.jest-test-generator
    directive: "Generate comprehensive Jest test files with mocking, spies, and matchers. Analyze source code, create test files, configure Jest, and verify tests pass."
    capabilities:
      mutates_state: true
      generates_code: true
      runs_tests: true

  ao.pytest-test-implement:
    mode: agent
    agent: ao.pytest-test-generator
    directive: "Generate comprehensive pytest test files with fixtures, parametrize, and exception testing. Parse Python source files using ast module, create test files in tests/ directory, configure pytest with conftest.py, and verify tests pass."
    capabilities:
      mutates_state: true
      generates_code: true
      runs_tests: true

  ao.e2e-test-plan:
    mode: agent
    agent: ao.e2e-test-planner
    directive: "Analyze application source code to identify user flows, event handlers, and business logic. Generate comprehensive E2E test plans in markdown format covering happy paths, error recovery, and edge cases. Output to e2e-test-plan.md."
    capabilities:
      mutates_state: true
      generates_code: true

  ao.integration-test-implement:
    mode: agent
    agent: ao.integration-test-generator
    directive: "Generate integration tests for TypeScript projects by analyzing cross-package dependencies and public API boundaries. Parse multiple TypeScript files, identify cross-package imports and public API boundaries, generate integration tests for public API calls between packages, cover happy path and error scenarios, output valid TypeScript files runnable with vitest."
    capabilities:
      mutates_state: true
      generates_code: true
      runs_tests: true

  ao.coverage-improvement-implement:
    mode: agent
    agent: ao.coverage-improvement-agent
    directive: "Parse vitest coverage reports (JSON/LCOV/HTML format), identify under-tested modules and uncovered code paths. Generate targeted test cases for uncovered lines, branches, and functions. Support boundary condition edge case generation. Read coverage report from coverage/coverage-final.json or coverage/lcov.info, analyze source files, generate coverage improvement tests in tests/coverage/ directory, run tests to verify they pass, and re-run coverage to verify improvement."
    capabilities:
      mutates_state: true
      generates_code: true
      runs_tests: true
      code_analysis: true

  ao.edge-cases-merge-implement:
    mode: agent
    agent: ao.edge-cases-merge-agent
    directive: "Merge edge-cases module from origin/ao/task-013 branch. Extract files (detector.ts, generator.ts, types.ts, edge-cases.test.ts, index.ts), update src/index.ts to export edge-cases, preserve src/pytest-test-generator.ts, run tests to verify, and commit."
    capabilities:
      mutates_state: true
      git_operations: true
      conflict_resolution: true

workflows:
  - id: ao.testing/standard
    name: "ao-skill-testing Standard"
    description: "Plan → Implement → Push → PR"
    phases:
      - ao.testing-implement
      - push-branch
      - create-pr
      - pr-review

  - id: ao.testing/quick-fix
    name: "ao-skill-testing Quick Fix"
    description: "Implement → Push → PR"
    phases:
      - ao.testing-implement
      - push-branch
      - create-pr

  - id: ao.testing/jest-generate
    name: "Jest Test Generation"
    description: "Generate comprehensive Jest test suite with mocking, spies, and configuration"
    phases:
      - ao.jest-test-implement
      - push-branch
      - create-pr
      - pr-review

  - id: ao.testing/pytest-generate
    name: "Pytest Test Generation"
    description: "Generate comprehensive pytest test suite with fixtures, parametrize, and exception testing"
    phases:
      - ao.pytest-test-implement
      - push-branch
      - create-pr
      - pr-review

  - id: ao.testing/e2e-plan
    name: "E2E Test Planning"
    description: "Analyze application source code and generate comprehensive E2E test plans in markdown format covering happy paths, error recovery, and edge cases"
    phases:
      - ao.e2e-test-plan
      - push-branch
      - create-pr
      - pr-review

  - id: ao.testing/integration-generate
    name: "Integration Test Generation"
    description: "Generate integration tests for TypeScript projects by analyzing cross-package dependencies and public API boundaries"
    phases:
      - ao.integration-test-implement
      - push-branch
      - create-pr
      - pr-review

  - id: ao.testing/coverage-generate
    name: "Coverage Improvement"
    description: "Analyze vitest coverage reports, identify untested code paths, and generate targeted tests to improve coverage"
    phases:
      - ao.coverage-improvement-implement
      - push-branch
      - create-pr
      - pr-review

  - id: ao.testing/edge-cases-merge
    name: "Edge Cases Module Merge"
    description: "Merge edge-cases module from origin/ao/task-013 branch while preserving existing code like pytest-test-generator.ts"
    phases:
      - ao.edge-cases-merge-implement
      - push-branch
      - create-pr
      - pr-review
